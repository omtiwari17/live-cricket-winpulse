{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}WinPulse - Live Cricket{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'dashboard/css/base.css' %}">

  {% block extra_css %}{% endblock %}

</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow-top"></div>

  <div class="page-content">

    <header class="site-header">
      <div class="container">
        <div class="header-inner">

          <a href="/" class="logo">WIN<span class="logo-accent">PULSE</span></a>

          <div class="header-right">
            <span class="badge badge-mock" id="mock-indicator" style="display:none;">
              MOCK DATA
            </span>
            <div class="badge badge-live">
              <div class="live-dot"></div>
              LIVE
            </div>
          </div>

        </div>
      </div>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer fade-up">
      <div class="container">
        <p>Built with <span class="footer-heart">♥</span> and 🏏 by <strong>Om Tiwari</strong></p>
        <div class="footer-links">
          <a href="https://omtiwari.tech" target="_blank" rel="noopener noreferrer">Portfolio</a>
          <a href="https://github.com/omtiwari17" target="_blank" rel="noopener noreferrer">GitHub</a>
          <a href="https://linkedin.com/in/tiwariom/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
      </div>
    </footer>

  </div>

  {% block extra_js %}{% endblock %}

</body>
</html>
