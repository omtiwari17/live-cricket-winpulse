services:
  - type: web
    name: live-cricket-winpulse
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn winpulse.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false